<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我們的存摺 - 抽象幾何誌</title>
    <link rel="icon" href="assets/favicon.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
    .glass-panel {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
    }
    .active-tab {
        background: rgba(244, 63, 94, 0.1);
        border: 1px solid rgba(244, 63, 94, 0.2);
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(0.8);
        cursor: pointer;
    }
    .card-animate {
        animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .press-effect:active {
        transform: scale(0.97);
        transition: transform 0.1s ease;
    }
</style>
</head>
<body class="bg-[#070a13] min-h-screen text-slate-300 font-sans antialiased overflow-x-hidden">

    <!-- 霓虹幾何背景 -->
    <div class="fixed top-[-10%] left-[-20%] w-[80vw] h-[80vw] bg-blue-500/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[-20%] w-[70vw] h-[70vw] bg-pink-500/10 rounded-full blur-[120px] pointer-events-none"></div>

    <!-- 驗證登入遮罩視窗 -->
    <div id="login-overlay" class="fixed inset-0 bg-[#070a13] z-[100] flex items-center justify-center p-6">
        <div class="glass-panel w-full max-w-sm p-8 rounded-3xl space-y-6 border border-white/10 text-center">
            <div>
                <h2 class="text-base font-light tracking-[0.2em] text-slate-200">我們的存摺</h2>
                <p class="text-[10px] text-slate-500 font-mono mt-1">請輸入驗證憑證登入</p>
            </div>
            <div class="space-y-3 text-left">
                <input type="text" id="login-username" placeholder="名字 (帳號)" class="w-full bg-white/5 border border-white/5 px-4 py-3 rounded-xl text-sm text-slate-200 placeholder-slate-700 focus:outline-none focus:border-pink-500/30">
                <input type="password" id="login-password" placeholder="密碼" class="w-full bg-white/5 border border-white/5 px-4 py-3 rounded-xl text-sm text-slate-200 placeholder-slate-700 focus:outline-none focus:border-pink-500/30">
            </div>
            <button onclick="handleLogin()" class="w-full py-3 rounded-xl bg-gradient-to-r from-pink-500/20 to-purple-500/20 text-pink-300 border border-pink-500/30 text-xs font-medium tracking-widest uppercase cursor-pointer hover:from-pink-500/30 hover:to-purple-500/30 transition-all">
                驗證並登入系統
            </button>
        </div>
    </div>

    <!-- 🚀 核心升級：外層大容器在電腦版自動橫向伸展 (max-w-6xl)，在手機版維持居中窄版 (max-w-md) -->
    <div class="w-full max-w-md md:max-w-6xl mx-auto min-h-screen flex flex-col relative pb-24 md:pb-6 p-4 md:p-8">
        
        <!-- 💻 電腦版格局：將頁面拆成左右兩大區塊 -->
        <div class="flex flex-col md:flex-row gap-6 items-start flex-1 w-full">
            
            <!-- 📌 【左側固定欄】：放抬頭、結餘資產看板、以及主要導覽按鈕 -->
            <aside class="w-full md:w-80 shrink-0 space-y-4 sticky md:top-8 z-50">
                <header class="glass-panel p-6 rounded-3xl border border-white/5 bg-[#070a13]/70 backdrop-blur-md">
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <h1 class="text-sm font-light tracking-[0.25em] text-slate-400 uppercase">我們的存摺</h1>
                            <p class="text-[9px] text-slate-600 font-mono tracking-wider mt-0.5">即時雲端同步</p>
                        </div>
                        <div class="text-[9px] bg-white/5 text-slate-300 border border-white/5 font-medium px-3 py-1 rounded-full tracking-widest">
                            <span id="role-badge">未登入</span>
                        </div>
                    </div>

                    <!-- 結餘看板：在電腦上改成垂直排列更有質感 -->
                    <div class="flex flex-row md:flex-col gap-4 justify-between md:justify-start text-left">
                        <div class="border-l border-blue-400/40 pl-3 py-1">
                            <p class="text-[9px] text-slate-500 font-light tracking-wider">男友結餘</p>
                            <p id="bfd-balance" class="text-sm md:text-lg font-medium text-blue-200 tracking-tight mt-0.5">NT$0</p>
                        </div>
                        <div class="border-l border-pink-400/40 pl-3 py-1">
                            <p class="text-[9px] text-slate-500 font-light tracking-wider">女友結餘</p>
                            <p id="gfd-balance" class="text-sm md:text-lg font-medium text-pink-200 tracking-tight mt-0.5">NT$0</p>
                        </div>
                        <div class="border-l border-emerald-400/40 pl-3 py-1">
                            <p class="text-[9px] text-slate-500 font-light tracking-wider">共同帳戶</p>
                            <p id="shared-balance" class="text-sm md:text-lg font-medium text-emerald-200 tracking-tight mt-0.5">NT$0</p>
                        </div>
                    </div>
                </header>

                <!-- 5 分頁導覽列：在電腦上維持左側側邊欄按鈕風格，手機版自動維持橫排 -->
                <nav id="tab-container" class="grid grid-cols-5 md:grid-cols-1 gap-1.5 p-1 bg-white/2 rounded-2xl border border-white/5">
                    <button class="active-tab text-pink-400 p-2.5 rounded-xl text-center md:text-left md:px-4 flex flex-col md:flex-row items-center gap-2 transition-all cursor-pointer text-xs"><span>📊</span>帳本</button>
                    <button class="glass-panel text-slate-400 p-2.5 rounded-xl text-center md:text-left md:px-4 flex flex-col md:flex-row items-center gap-2 transition-all cursor-pointer hover:bg-white/5 text-xs"><span>💰</span>收入</button>
                    <button class="glass-panel text-slate-400 p-2.5 rounded-xl text-center md:text-left md:px-4 flex flex-col md:flex-row items-center gap-2 transition-all cursor-pointer hover:bg-white/5 text-xs"><span>👥</span>共同</button>
                    <button class="glass-panel text-slate-400 p-2.5 rounded-xl text-center md:text-left md:px-4 flex flex-col md:flex-row items-center gap-2 transition-all cursor-pointer hover:bg-white/5 text-xs"><span>🔮</span>清單</button>
                    <button class="glass-panel text-slate-400 p-2.5 rounded-xl text-center md:text-left md:px-4 flex flex-col md:flex-row items-center gap-2 transition-all cursor-pointer hover:bg-white/5 text-xs"><span>📈</span>統計</button>
                </nav>
            </aside>

            <!-- 📌 【右側主內容欄】：寬度自動拉伸，在電腦上極度舒適 -->
            <main class="flex-1 w-full space-y-6 z-10 relative">
                <div id="main-content" class="space-y-6"></div>
            </main>

        </div>

        <!-- 右下角懸浮 ＋ 按鈕（在電腦上會貼心縮在右下角，大螢幕滑動手感極佳） -->
        <button id="float-add-btn" onclick="openTransactionModal()" class="fixed bottom-24 md:bottom-8 right-6 md:right-12 w-12 h-12 bg-gradient-to-r from-pink-500 to-purple-500 text-white rounded-full flex items-center justify-center text-xl shadow-[0_0_20px_rgba(244,63,94,0.4)] cursor-pointer hover:scale-110 active:scale-95 transition-all z-40">
            ＋
        </button>

        <!-- 新增與編輯明細彈窗視窗 -->
        <div id="transaction-modal" class="hidden fixed inset-0 bg-[#070a13]/80 backdrop-blur-md z-50 flex items-center justify-center p-6">
            <div class="glass-panel w-full max-w-sm p-6 rounded-3xl space-y-4 border border-white/10 card-animate">
                <div class="flex justify-between items-center">
                    <h3 id="modal-title" class="text-xs font-mono tracking-widest text-slate-400">// 新增明細</h3>
                    <button onclick="closeTransactionModal()" class="text-slate-500 hover:text-slate-300 font-mono text-xs cursor-pointer">CLOSE X</button>
                </div>
                
                <input type="hidden" id="edit-id">
                <div class="space-y-3">
                    <select id="tx-category" class="w-full bg-white/5 border border-white/5 px-4 py-2.5 rounded-xl text-sm text-slate-400 focus:outline-none focus:border-pink-500/30 bg-[#121826]">
                        <option value="早餐">🍔 早餐</option>
                        <option value="午餐">🍱 午餐</option>
                        <option value="晚餐">🍜 晚餐</option>
                        <option value="宵夜">🌙 宵夜</option>
                        <option value="飲料">🧋 飲料</option>
                        <option value="零食">🍪 零食</option>
                        <option value="交通">🚗 交通支出</option>
                        <option value="購物">🛍️ 日常購物</option>
                        <option value="娛樂">🎬 娛樂生活</option>
                        <option value="水電">⚡ 水電費支出</option>
                        <option value="電信">📱 電信費支出</option>
                        <option value="其他">📦 其他雜項</option>
                    </select>

                    <div class="space-y-1">
                        <label class="text-[9px] text-slate-500 font-mono px-1">// 選擇消費日期</label>
                        <input type="date" id="tx-date" class="w-full bg-white/5 border border-white/5 px-4 py-2.5 rounded-xl text-sm text-slate-200 focus:outline-none focus:border-pink-500/30">
                    </div>

                    <input type="number" id="tx-amount" placeholder="金額 (NT$)" class="w-full bg-white/5 border border-white/5 px-4 py-2.5 rounded-xl text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-pink-500/30">
                    <input type="text" id="tx-title" placeholder="備註說明 (選填，如：麥當勞)" class="w-full bg-white/5 border border-white/5 px-4 py-2.5 rounded-xl text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-pink-500/30">

                    <select id="tx-account-type" class="w-full bg-white/5 border border-white/5 px-4 py-2.5 rounded-xl text-sm text-slate-400 focus:outline-none focus:border-pink-500/30 bg-[#121826]">
                        <option value="personal">個人專屬帳本</option>
                        <option value="shared">雙人共同公帳</option>
                    </select>
                </div>
                
                <button onclick="saveTransaction()" class="w-full py-2.5 rounded-xl bg-gradient-to-r from-pink-500/20 to-purple-500/20 text-pink-300 border border-pink-500/30 text-xs font-medium tracking-widest uppercase cursor-pointer hover:from-pink-500/30 hover:to-purple-500/30 transition-all">
                    確認寫入數據
                </button>
            </div>
        </div>

        <footer class="p-6 text-center space-y-3 z-10 mt-auto md:text-left md:pl-86">
            <div class="h-[1px] bg-gradient-to-r from-transparent via-slate-800 to-transparent w-full mb-2"></div>
            <p class="text-[10px] text-slate-500 font-mono tracking-widest">
                配對狀態：<span id="sync-status" class="text-slate-300 font-bold">已同步 ✓</span>
            </p>
            <div class="flex justify-center md:justify-start gap-6 text-[10px] font-medium tracking-wider text-blue-400/80">
                <button onclick="purgeData()" class="hover:text-slate-300 transition-colors text-slate-600 cursor-pointer">清空本地暫存</button>
            </div>
        </footer>
    </div>

    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <!-- 🚀 大版號升級至 v=128 -->
    <script src="app.js?v=128"></script> 
</body>
</html>
